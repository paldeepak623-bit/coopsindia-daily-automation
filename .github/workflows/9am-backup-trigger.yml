name: CoopsIndia 7AM Backup Trigger

on:
  schedule:
    - cron: "35 1 * * *"
    - cron: "5 2 * * *"
  workflow_dispatch:

permissions:
  actions: write
  contents: read

jobs:
  trigger-daily:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'daily-coopsindia.yml',
              ref: 'main'
            });
