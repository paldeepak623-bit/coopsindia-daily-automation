name: CoopsIndia Daily Reporton:  schedule:    - cron: "30 3 * * *"→ Runs at 03:30    - cron: "0 4 * * *"
  workflow_dispatch:jobs:  daily-report:    runs-on: ubuntu-latest    timeout-minutes: 35    steps:      - uses: actions/checkout@v4      - uses: actions/setup-python@v5        with:          python-version: "3.11"      - name: Install rclone        run: curl -fsSL https://rclone.org/install.sh | sudo bash      - name: Install deps        run: |          pip install -r requirements.txt          playwright install chromium --with-deps      - name: Write config        env:          COOPS_LOGIN_ID: ${{ secrets.COOPS_LOGIN_ID }}          COOPS_PASSWORD: ${{ secrets.COOPS_PASSWORD }}          RCLONE_CONFIG_B64: ${{ secrets.RCLONE_CONFIG_B64 }}        run: |          mkdir -p credentials logs          cat > config.json <<EOF          {"login_id":"$COOPS_LOGIN_ID","password":"$COOPS_PASSWORD","report":{"use_yesterday_date":true,"keep_local_copy":false},"upload":{"google_drive":{"enabled":true,"folder_id":"1QSO9aBUym6ZdvwrkZGq7H-SCALhC34S5","rclone_remote":"gdrive"},"onedrive":{"enabled":false}}}          EOF          echo "$RCLONE_CONFIG_B64" | base64 -d > rclone.conf      - name: Run daily job        env:          COOPS_AUTO: "1"
