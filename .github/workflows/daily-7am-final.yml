name: CoopsIndia Daily 7AM IST

# Primary cloud schedule: 7:00 + 7:05 AM IST backups. Also accepts dispatch trigger.
on:
  schedule:
    - cron: "30 1 * * *"
    - cron: "35 1 * * *"
  workflow_dispatch:
  repository_dispatch:
    types: [coops-daily-run]

concurrency:
  group: coops-daily-7am-ist
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  gate:
    runs-on: ubuntu-latest
    outputs:
      run_job: ${{ steps.check.outputs.run_job }}
    steps:
      - name: 7 AM IST gate
        id: check
        run: |
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "run_job=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          H=$(TZ=Asia/Kolkata date +%H)
          M=$(TZ=Asia/Kolkata date +%M)
          echo "IST: $(TZ=Asia/Kolkata date)"
          if [ "$H" = "07" ] && [ "$M" -le 10 ]; then
            echo "run_job=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_job=false" >> "$GITHUB_OUTPUT"
          fi

  daily-report:
    needs: gate
    if: needs.gate.outputs.run_job == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install rclone
        run: curl -fsSL https://rclone.org/install.sh | sudo bash
      - name: Install deps
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps
      - name: Write config
        env:
          COOPS_LOGIN_ID: ${{ secrets.COOPS_LOGIN_ID }}
          COOPS_PASSWORD: ${{ secrets.COOPS_PASSWORD }}
          RCLONE_CONFIG_B64: ${{ secrets.RCLONE_CONFIG_B64 }}
        run: |
          mkdir -p credentials logs
          python3 -c "import json,os; json.dump({'login_id':os.environ['COOPS_LOGIN_ID'],'password':os.environ['COOPS_PASSWORD'],'report':{'use_yesterday_date':True,'keep_local_copy':False},'upload':{'google_drive':{'enabled':True,'folder_id':'1QSO9aBUym6ZdvwrkZGq7H-SCALhC34S5','rclone_remote':'gdrive'},'onedrive':{'enabled':False}}}, open('config.json','w'))"
          echo "$RCLONE_CONFIG_B64" | base64 -d > rclone.conf
      - name: Run daily job
        id: job
        env:
          COOPS_AUTO: "1"
        run: python daily_job.py

      - name: Report folder date
        id: folder
        if: always()
        run: |
          FOLDER=$(TZ=Asia/Kolkata date -d "yesterday" +%d-%m-%Y)
          echo "name=$FOLDER" >> "$GITHUB_OUTPUT"
          echo "time=$(TZ=Asia/Kolkata date '+%d-%m-%Y %H:%M IST')" >> "$GITHUB_OUTPUT"

      - name: WhatsApp / SMS alert
        if: always()
        env:
          NOTIFY_PHONES: ${{ secrets.NOTIFY_PHONES }}
          CALLMEBOT_APIKEYS: ${{ secrets.CALLMEBOT_APIKEYS }}
          CALLMEBOT_APIKEY: ${{ secrets.CALLMEBOT_APIKEY }}
          NOTIFY_TARGETS: ${{ secrets.NOTIFY_TARGETS }}
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_FROM_NUMBER: ${{ secrets.TWILIO_FROM_NUMBER }}
          REPORT_FOLDER: ${{ steps.folder.outputs.name }}
          JOB_TIME_IST: ${{ steps.folder.outputs.time }}
        run: |
          if [ "${{ steps.job.outcome }}" = "success" ]; then
            python notify.py success
          else
            python notify.py failure
          fi

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coops-logs-${{ github.run_number }}
          path: logs/
