name: CoopsIndia 7AM Wait Trigger

# GitHub native schedule is unreliable at exact 7:00 AM IST.
# Wake at 6:30 AM IST, wait until 7:00 AM, then start the daily job.
on:
  schedule:
    - cron: "0 1 * * *"
    - cron: "25 1 * * *"
  workflow_dispatch:

permissions:
  actions: write
  contents: read

jobs:
  wait-and-trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Wait until 7:00 AM IST
        run: |
          TARGET=$(TZ=Asia/Kolkata date -d "$(TZ=Asia/Kolkata date +%Y-%m-%d) 07:00:00" +%s)
          NOW=$(date +%s)
          WAIT=$((TARGET - NOW))
          echo "IST now: $(TZ=Asia/Kolkata date)"
          echo "Wait seconds: $WAIT"
          if [ "$WAIT" -gt 0 ]; then sleep "$WAIT"; fi
          echo "Trigger IST: $(TZ=Asia/Kolkata date)"

      - name: Start CoopsIndia daily job
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'daily-coopsindia.yml',
              ref: 'main'
            });
